name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    # Postgres 16 service — matches local dev (docker-compose or brew).
    # The test harness in src/__tests__/_helpers/db.ts reads DATABASE_URL
    # below and runs `prisma migrate deploy` before the first test.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: immo
          POSTGRES_PASSWORD: immo
          POSTGRES_DB: immo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U immo -d immo_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://immo:immo@localhost:5432/immo_test?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: i18n codegen drift check
        run: npm run i18n:codegen -- --check

      - name: i18n drift check
        run: npm run i18n:check

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
